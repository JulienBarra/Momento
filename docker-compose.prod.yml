services:
  # Reverse-proxy + HTTPS (Let's Encrypt auto)
  caddy:
    image: caddy:2-alpine
    container_name: momento_caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Base de données
  postgres:
    image: postgres:15-alpine
    container_name: momento_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Backend AdonisJS
  backend:
    build:
      context: ./backend
    container_name: momento_backend
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      TZ: UTC
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      DRIVE_DISK: fs
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
    volumes:
      - ./uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend React (build statique servi par nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${API_DOMAIN}
    container_name: momento_frontend
    restart: unless-stopped

volumes:
  pg_data:
  caddy_data:
  caddy_config:
